<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Network Monitor</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <form class="card login-card" method="post" action="/login">
      <div style="font-weight:700;font-size:1.1rem;">Network Monitor</div>
      <input type="hidden" name="next" value="{{ next }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      <button class="primary" type="submit" style="width:100%;margin-top:16px;">Sign in</button>
    </form>
  </div>
</body>
</html>
