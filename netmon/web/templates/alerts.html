{% extends "base.html" %}
{% block title %}Alerts — Network Monitor{% endblock %}
{% block nav_alerts %}active{% endblock %}
{% block content %}
  <h1>Alerts</h1>
  <label style="font-size:0.85rem;color:var(--text-dim);">
    <input type="checkbox" id="hide-acknowledged" checked> Hide acknowledged
  </label>
  <div class="card" style="margin-top:12px;">
    <table id="alerts-table">
      <thead><tr><th>Type</th><th>Severity</th><th>Message</th><th>When</th><th></th></tr></thead>
      <tbody><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody>
    </table>
  </div>
{% endblock %}
{% block scripts %}
<script>document.addEventListener("DOMContentLoaded", NetmonDashboard.renderAlertsPage);</script>
{% endblock %}
